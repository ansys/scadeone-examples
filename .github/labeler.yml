documentation:
  - any:
      - changed-files:
          - any-glob-to-any-file: ['doc/source/**/*.rst, README.rst']

maintenance:
  - any:
      - changed-files:
          - any-glob-to-any-file: ['.github/**/*', 'requirements/**/*']
enhancement:
  - any:
      - changed-files:
          - any-glob-to-any-file: ['models/**/*']
ci:
  - any:
      - changed-files:
          - any-glob-to-any-file: ['.github/workflows/**']
